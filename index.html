<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>真牛逼</title>

  <!-- ============================================================
       Open Graph 配置 —— WhatsApp 抓取这些标签生成预览卡片
       部署后把所有 https://YOUR_DOMAIN/ 换成你的真实域名
       ============================================================ -->

  <!-- 卡片标题（粗体那行） -->
  <meta property="og:title" content="hello">
  <!-- 卡片描述（标题下方灰色那行） -->
  <meta property="og:description" content="niubi">
  <!-- 预览图：必须是公网 HTTPS 绝对地址 -->
  <meta property="og:image" content="https://htmlniub.vercel.app/preview.png">
  <meta property="og:image:width" content="652">
  <meta property="og:image:height" content="298">
  <!-- 网页本身的绝对地址 -->
  <meta property="og:url" content="https://htmlniub.vercel.app/">
  <meta property="og:type" content="website">

  <!-- Twitter 卡片标签（部分平台兼容，一并加上） -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="牛逼">
  <meta name="twitter:description" content="真牛逼">
  <meta name="twitter:image" content="https://htmlniub.vercel.app/preview.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f4f5;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card {
      max-width: 90vw;
      text-align: center;
    }
    .card img {
      width: 100%;
      max-width: 800px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .12);
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="preview.png" alt="预览图">
  </div>
</body>
</html>
